name: Build C# OPC DA Agent (.NET 4.0 XP Compatible) - Fixed

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-net40:
    name: Build .NET Framework 4.0 (Windows XP Compatible)
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      with:
        msbuild-version: '16.0'

    - name: Register OPC Automation Type Library
      shell: pwsh
      run: |
        $dllPath = (Resolve-Path "csharp_agent\OPCDAAuto.dll").Path
        Write-Host "Registering type library: $dllPath"
        $code = @"
        using System;
        using System.Runtime.InteropServices;
        class RegTlb {
            [DllImport("oleaut32.dll", CharSet = CharSet.Unicode)]
            static extern int LoadTypeLibEx(string szFile, int regKind, out IntPtr pTlb);
            const int REGKIND_REGISTER = 1;
            static void Main(string[] args) {
                IntPtr tlb;
                int hr = LoadTypeLibEx(args[0], REGKIND_REGISTER, out tlb);
                if (hr == 0) Console.WriteLine("OK");
                else Console.WriteLine("FAILED: 0x" + hr.ToString("X8"));
                // Verify
                try {
                    var t = Type.GetTypeFromProgID("OPCAutomation.OPCServer");
                    Console.WriteLine("Verify: " + (t != null ? "FOUND" : "NOT FOUND"));
                } catch (Exception ex) {
                    Console.WriteLine("Verify error: " + ex.Message);
                }
            }
        }
        "@
        # 用 32 位编译和运行（OPCDAAuto.dll 是 32 位）
        $csFile = "$env:TEMP\regtlb.cs"
        $exeFile = "$env:TEMP\regtlb32.exe"
        Set-Content -Path $csFile -Value $code -Encoding UTF8
        & "C:\Windows\Microsoft.NET\Framework\v4.0.30319\csc.exe" /out:$exeFile /platform:x86 $csFile 2>&1
        & $exeFile $dllPath 2>&1
        Write-Host "32-bit registration done"
        # 也用 64 位注册一次
        $exeFile64 = "$env:TEMP\regtlb64.exe"
        & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /out:$exeFile64 /platform:x64 $csFile 2>&1
        & $exeFile64 $dllPath 2>&1
        Write-Host "64-bit registration done"

    - name: Create working copy
      run: |
        # 创建工作目录
        New-Item -ItemType Directory -Force -Path 'work\csharp_agent'
        Copy-Item 'csharp_agent\*' 'work\csharp_agent\' -Recurse -Force
        
        Write-Host 'Project configured for .NET Framework 4.0 (XP compatible)'

    - name: Download NuGet CLI
      run: |
        if (!(Test-Path 'nuget.exe')) {
          Invoke-WebRequest -Uri 'https://dist.nuget.org/win-x86-commandline/v5.8.1/nuget.exe' -OutFile 'nuget.exe'
        }

    - name: Restore NuGet packages
      run: |
        New-Item -ItemType Directory -Force -Path 'work\csharp_agent\packages'
        .\nuget.exe locals all -clear
        .\nuget.exe restore 'work\csharp_agent\OPC_DA_Agent.csproj' -PackagesDirectory 'work\csharp_agent\packages'

    - name: Build Debug (.NET 4.0 / XP)
      run: |
        if (Test-Path 'work\csharp_agent\bin') {
          Remove-Item -Recurse -Force 'work\csharp_agent\bin' -ErrorAction SilentlyContinue
        }
        # runner 通常只装了 4.8 引用集，缺少 net4.0 的；用 4.8 引用集兜底
        # （4.8 是 4.0 超集，本代码未用 4.8 专属 API，产出的 4.0 程序集仍可在 XP 运行）
        $refDir = Join-Path ([Environment]::GetFolderPath('ProgramFilesX86')) "Reference Assemblies\Microsoft\Framework\.NETFramework\v4.8"
        if (!(Test-Path $refDir)) {
          $refDir = Join-Path ([Environment]::GetFolderPath('ProgramFilesX86')) "Reference Assemblies\Microsoft\Framework\.NETFramework\v4.0"
        }
        msbuild 'work\csharp_agent\OPC_DA_Agent.csproj' /p:Configuration=Debug /p:Platform=AnyCPU /p:FrameworkPathOverride="$refDir" /v:minimal

    - name: Build Release (.NET 4.0 / XP)
      run: |
        $refDir = Join-Path ([Environment]::GetFolderPath('ProgramFilesX86')) "Reference Assemblies\Microsoft\Framework\.NETFramework\v4.8"
        if (!(Test-Path $refDir)) {
          $refDir = Join-Path ([Environment]::GetFolderPath('ProgramFilesX86')) "Reference Assemblies\Microsoft\Framework\.NETFramework\v4.0"
        }
        msbuild 'work\csharp_agent\OPC_DA_Agent.csproj' /p:Configuration=Release /p:Platform=AnyCPU /p:FrameworkPathOverride="$refDir" /v:minimal

    - name: Verify builds
      run: |
        if (Test-Path 'work\csharp_agent\bin\Debug\OPC_DA_Agent.exe') {
          Write-Host '✓ Debug build successful'
        } else {
          Write-Host '✗ Debug build failed'
          exit 1
        }
        if (Test-Path 'work\csharp_agent\bin\Release\OPC_DA_Agent.exe') {
          Write-Host '✓ Release build successful'
        } else {
          Write-Host '✗ Release build failed'
          exit 1
        }

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OPC_DA_Agent_NET40
        path: work\csharp_agent\bin/
        retention-days: 90
